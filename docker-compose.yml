services:
  app:
    image: future-ready-talent:local
    build:
      context: .
      args:
        PYTHON_VERSION: "3.14.6"
    init: true
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FRT_DATABASE_PATH: /app/data/future_ready_talent.db
      FRT_DATASET_PATH: /app/future-ready-talent-dataset
      FRT_MODEL_CACHE_PATH: /app/data/model-cache
      HF_HOME: /app/data/model-cache/huggingface
      XDG_CACHE_HOME: /app/data/model-cache
    volumes:
      - ./data:/app/data
      - ./future-ready-talent-dataset:/app/future-ready-talent-dataset:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
